name: CopyGuard Signals

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore signal cooldown state
        uses: actions/cache/restore@v4
        with:
          path: copyguard_state.json
          key: copyguard-state-${{ github.run_id }}
          restore-keys: |
            copyguard-state-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run CopyGuard scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ACCOUNT_CAPITAL_USDT: ${{ vars.ACCOUNT_CAPITAL_USDT || '500' }}
          POSITION_USDT_PER_SIGNAL: ${{ vars.POSITION_USDT_PER_SIGNAL || '40' }}
          MIN_24H_QUOTE_VOLUME: "15000000"
          MAX_24H_CHANGE_PCT: "18"
          MAX_SIGNALS_PER_RUN: "5"
          MIN_LONG_SCORE: "8.0"
          MIN_SHORT_SCORE: "8.7"
          COOLDOWN_HOURS: "6"
          SEND_NO_SIGNAL: "false"
        run: python copyguard_github.py

      - name: Save signal cooldown state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: copyguard_state.json
          key: copyguard-state-${{ github.run_id }}
